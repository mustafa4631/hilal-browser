<!-- Hilal Browser panel -->

<html:template id="template-paneHilal">
<hbox id="hilalCategory"
      class="subcategory"
      hidden="true"
      data-category="paneHilal">
  <html:h1 data-l10n-id="hilal-settings-header"/>
</hbox>

<groupbox id="hilalWorkspacesGroup" data-category="paneHilal" hidden="true">
  <label><html:h2 data-l10n-id="hilal-workspaces-header"/></label>
  <vbox align="start">
    <checkbox id="hilalWorkspacesEnabled"
              data-l10n-id="hilal-workspaces-enabled"/>
    <checkbox id="hilalWorkspacesPinnedPublic"
              data-l10n-id="hilal-workspaces-pinned-public"/>
    <checkbox id="hilalWorkspacesGroupsPublic"
              data-l10n-id="hilal-workspaces-groups-public"/>
    <hbox>
      <description flex="1" data-l10n-id="hilal-workspaces-reset-description"/>
      <button id="hilalWorkspacesReset"
              is="highlightable-button"
              class="accessory-button"
              data-l10n-id="hilal-workspaces-reset-button"/>
    </hbox>
  </vbox>
</groupbox>
<groupbox id="hilalSidebarGroup" data-category="paneHilal" hidden="true">
  <label><html:h2 data-l10n-id="hilal-sidebar-header"/></label>
  <vbox align="start" style="margin-bottom: 16px;">
    <checkbox id="hilalSidebarCompactEnabled"
              data-l10n-id="hilal-sidebar-compact-enabled"
              style="margin-bottom: 4px; font-weight: bold;"/>
    <vbox class="indent" style="margin-bottom: 12px;">
      <checkbox id="hilalSidebarCompactHideToolbar"
                data-l10n-id="hilal-sidebar-compact-hide-toolbar"
                style="margin-bottom: 4px;"/>
      <description style="font-size: 0.9em; opacity: 0.7; margin: 0; line-height: 1.4; max-width: 650px;" data-l10n-id="hilal-sidebar-compact-hide-toolbar-desc"/>
    </vbox>
    <description style="margin-bottom: 8px; font-weight: bold;" data-l10n-id="hilal-sidebar-footer-items-label"/>
    <checkbox id="hilalSidebarFooterBookmarks"
              data-l10n-id="hilal-sidebar-footer-bookmarks"/>
    <checkbox id="hilalSidebarFooterHistory"
              data-l10n-id="hilal-sidebar-footer-history"/>
    <checkbox id="hilalSidebarFooterPasswords"
              data-l10n-id="hilal-sidebar-footer-passwords"/>
    <checkbox id="hilalSidebarFooterDownloads"
              data-l10n-id="hilal-sidebar-footer-downloads"/>
    <checkbox id="hilalSidebarFooterPrivacy"
              data-l10n-id="hilal-sidebar-footer-privacy"/>
    <checkbox id="hilalSidebarFooterSettings"
              data-l10n-id="hilal-sidebar-footer-settings"/>
  </vbox>

  <vbox align="start" style="border-top: 1px solid var(--in-content-border-color); padding-top: 16px; margin-top: 8px;" flex="1">
    <description style="margin-bottom: 8px; font-weight: bold;" data-l10n-id="hilal-sidebar-custom-shortcuts-label"/>
    <description style="margin-bottom: 8px; font-size: 0.9em; opacity: 0.85;" data-l10n-id="hilal-sidebar-custom-shortcuts-desc"/>

    <richlistbox id="hilalSidebarCustomList" style="height: 120px; width: 100%; min-width: 400px; margin-bottom: 10px;">
    </richlistbox>

    <hbox spacing="10" style="margin-bottom: 12px;">
      <button id="hilalSidebarCustomAdd"
              is="highlightable-button"
              class="accessory-button"
              data-l10n-id="hilal-sidebar-custom-add"/>
      <button id="hilalSidebarCustomRemove"
              is="highlightable-button"
              class="accessory-button"
              data-l10n-id="hilal-sidebar-custom-remove"
              disabled="true"/>
    </hbox>

    <vbox id="hilalSidebarCustomForm" hidden="true" style="width: 100%; min-width: 400px; padding: 12px; border: 1px solid var(--in-content-border-color); border-radius: 6px; background-color: var(--in-content-box-background); margin-top: 4px;">
      <grid>
        <columns>
          <column style="padding-right: 8px; font-weight: 500; min-width: 80px;"/>
          <column flex="1"/>
        </columns>
        <rows>
          <row align="center" style="margin-bottom: 8px;">
            <label data-l10n-id="hilal-sidebar-custom-name-label"/>
            <html:input id="hilalSidebarCustomName" type="text" data-l10n-id="hilal-sidebar-custom-name-placeholder"/>
          </row>
          <row align="center" style="margin-bottom: 8px;">
            <label data-l10n-id="hilal-sidebar-custom-url-label"/>
            <html:input id="hilalSidebarCustomUrl" type="text" data-l10n-id="hilal-sidebar-custom-url-placeholder"/>
          </row>
          <row align="center" style="margin-bottom: 8px;">
            <label data-l10n-id="hilal-sidebar-custom-icon-label"/>
            <html:select id="hilalSidebarCustomIcon" style="padding: 4px; border-radius: 4px; border: 1px solid var(--in-content-border-color); background: var(--in-content-button-background); color: inherit;">
              <html:option value="link" data-l10n-id="hilal-sidebar-custom-icon-link"/>
              <html:option value="bookmark" data-l10n-id="hilal-sidebar-custom-icon-bookmark"/>
              <html:option value="history" data-l10n-id="hilal-sidebar-custom-icon-history"/>
              <html:option value="key" data-l10n-id="hilal-sidebar-custom-icon-key"/>
              <html:option value="downloads" data-l10n-id="hilal-sidebar-custom-icon-downloads"/>
              <html:option value="shield" data-l10n-id="hilal-sidebar-custom-icon-shield"/>
              <html:option value="settings" data-l10n-id="hilal-sidebar-custom-icon-settings"/>
            </html:select>
          </row>
        </rows>
      </grid>
      <hbox spacing="10" style="margin-top: 12px;">
        <button id="hilalSidebarCustomSave"
                is="highlightable-button"
                class="accessory-button"
                data-l10n-id="hilal-sidebar-custom-save"/>
        <button id="hilalSidebarCustomCancel"
                is="highlightable-button"
                class="accessory-button"
                data-l10n-id="hilal-sidebar-custom-cancel"/>
      </hbox>
    </vbox>
  </vbox>
</groupbox>

<groupbox id="hilalPrivacyGroup" data-category="paneHilal" hidden="true">
  <label><html:h2 data-l10n-id="hilal-privacy-header"/></label>
  <vbox align="start">
    <description style="margin-bottom: 8px; max-width: 720px;" data-l10n-id="hilal-privacy-description"/>
    <radiogroup id="hilalPrivacyLevel" orient="vertical">
      <radio id="hilalPrivacyStandard"
             value="standard"
             data-l10n-id="hilal-privacy-standard"/>
      <radio id="hilalPrivacyStrict"
             value="strict"
             data-l10n-id="hilal-privacy-strict"/>
      <radio id="hilalPrivacyExtreme"
             value="extreme"
             data-l10n-id="hilal-privacy-extreme"/>
    </radiogroup>
  </vbox>
</groupbox>

<groupbox id="hilalUiFixGroup" data-category="paneHilal" hidden="true">
  <label><html:h2 data-l10n-id="hilal-uifix-header"/></label>
  <vbox align="start">
    <checkbox id="hilalUiFixEnabled"
              data-l10n-id="hilal-uifix-enabled"/>
    <vbox id="hilalUiFixSubOptions" class="indent">
      <checkbox id="hilalUiFixConnectToWindow"
                data-l10n-id="hilal-uifix-connect-to-window"/>
      <checkbox id="hilalUiFixCompactPadding"
                data-l10n-id="hilal-uifix-compact-padding"/>
      <checkbox id="hilalUiFixDynamicSeparator"
                data-l10n-id="hilal-uifix-dynamic-separator"/>
      <checkbox id="hilalUiFixBottomRounded"
                data-l10n-id="hilal-uifix-bottom-rounded"/>
      <checkbox id="hilalUiFixCloseOnHover"
                data-l10n-id="hilal-uifix-close-on-hover"/>
    </vbox>
  </vbox>
</groupbox>

<groupbox id="hilalBangsGroup" data-category="paneHilal" hidden="true">
  <label><html:h2 data-l10n-id="hilal-bangs-header"/></label>
  <vbox align="start" class="indent" flex="1">
    <richlistbox id="hilalBangsList" style="height: 150px; min-width: 400px; margin-bottom: 10px;">
    </richlistbox>

    <hbox spacing="10">
      <button id="hilalBangsAdd"
              is="highlightable-button"
              class="accessory-button"
              data-l10n-id="hilal-bangs-add-button"/>
      <button id="hilalBangsRemove"
              is="highlightable-button"
              class="accessory-button"
              data-l10n-id="hilal-bangs-remove-button"
              disabled="true"/>
    </hbox>

    <vbox id="hilalBangsForm" hidden="true" style="margin-top: 10px; padding: 10px; border: 1px solid var(--in-content-border-color); border-radius: 4px; background-color: var(--in-content-box-background);">
      <grid>
        <columns>
          <column/>
          <column flex="1"/>
        </columns>
        <rows>
          <row align="center">
            <label data-l10n-id="hilal-bangs-trigger-label"/>
            <html:input id="hilalBangsTrigger" type="text" placeholder="e.g., g"/>
          </row>
          <row align="center">
            <label data-l10n-id="hilal-bangs-searchurl-label"/>
            <html:input id="hilalBangsSearchUrl" type="text" placeholder="https://www.google.com/search?q={query}"/>
          </row>
          <row align="center">
            <label data-l10n-id="hilal-bangs-homeurl-label"/>
            <html:input id="hilalBangsHomeUrl" type="text" placeholder="https://www.google.com"/>
          </row>
        </rows>
      </grid>
      <hbox spacing="10" style="margin-top: 10px;">
        <button id="hilalBangsSave"
                is="highlightable-button"
                class="accessory-button"
                data-l10n-id="hilal-bangs-save-button"/>
        <button id="hilalBangsCancel"
                is="highlightable-button"
                class="accessory-button"
                data-l10n-id="hilal-bangs-cancel-button"/>
      </hbox>
    </vbox>
  </vbox>
</groupbox>

<groupbox id="hilalLanguageGroup" data-category="paneHilal" hidden="true">
  <label><html:h2 data-l10n-id="hilal-language-header"/></label>
  <vbox align="start" style="margin-bottom: 16px;">
    <description style="margin-bottom: 8px;" data-l10n-id="hilal-language-description"/>
    <hbox align="center" style="margin-top: 4px;">
      <html:select id="hilalLanguageSelect" style="padding: 4px; border-radius: 4px; border: 1px solid var(--in-content-border-color); background: var(--in-content-button-background); color: inherit; min-width: 200px; margin-right: 8px;">
        <!-- Dynamic populated options -->
      </html:select>
      <button id="hilalLanguageApply"
              is="highlightable-button"
              class="accessory-button"
              data-l10n-id="hilal-language-apply-button"/>
    </hbox>
  </vbox>
</groupbox>

<groupbox id="hilalShortcutsGroup" data-category="paneHilal" hidden="true">
  <label><html:h2 data-l10n-id="hilal-shortcuts-header"/></label>
  <description class="description-deemphasized" data-l10n-id="hilal-shortcuts-description" />
  <hbox>
        <button id="hilalShortcutsRestoreDefaults" data-l10n-id="hilal-shortcuts-reset" class="accessory-button"/>
  </hbox>
  <vbox id="hilalShortcutsWrapper" style="margin-top: 15px;">
    <html:table>
      <html:tbody id="hilalShortcutsTbody"></html:tbody>
    </html:table>
  </vbox>
</groupbox>
</html:template>
