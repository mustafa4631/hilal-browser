name: Verify patches

on:
  push:
  pull_request:

concurrency:
  group: verify-patches-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  HILAL_FIREFOX_UPSTREAM: https://github.com/mozilla-firefox/firefox.git

jobs:
  repo-guardrails:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Hilal Browser
        uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            hil/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('hil/Cargo.toml') }}

      - name: Test hil tool
        run: cargo test --manifest-path hil/Cargo.toml

      - name: Compile hil tool
        run: |
          cargo build --release --manifest-path hil/Cargo.toml
          mkdir -p bin
          cp hil/target/release/hil bin/hil
          strip bin/hil

      - name: Validate repository manifest
        run: ./bin/hil validate

      - name: Check repo guardrails
        run: node scripts/check-release-metadata.mjs --hil-bin ./bin/hil

      - name: Upload hil tool
        uses: actions/upload-artifact@v4
        with:
          name: hil-cli
          path: bin/hil
          if-no-files-found: error

  verify-patches:
    needs: repo-guardrails
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout Hilal Browser
        uses: actions/checkout@v4

      - name: Download hil tool
        uses: actions/download-artifact@v4
        with:
          name: hil-cli
          path: bin

      - name: Prepare hil tool
        run: chmod +x bin/hil

      - name: Cache Firefox source checkout
        uses: actions/cache@v4
        with:
          path: engine
          key: firefox-${{ hashFiles('upstream.lock') }}
          restore-keys: |
            firefox-

      - name: Set up Firefox source tree
        run: ./bin/hil setup

      - name: Apply Hilal patches
        run: ./bin/hil apply --force
