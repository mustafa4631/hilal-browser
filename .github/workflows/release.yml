name: Build and Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to build (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

env:
  HILAL_FIREFOX_UPSTREAM: "https://github.com/mozilla-firefox/firefox.git"

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
      version: ${{ steps.release_meta.outputs.version }}
      prerelease: ${{ steps.release_meta.outputs.prerelease }}
      has_secrets: ${{ steps.check_secrets.outputs.has_secrets }}

    steps:
      - name: Determine tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.vars.outputs.tag }}

      - name: Derive release metadata
        id: release_meta
        run: node scripts/release-env.mjs --tag "${{ steps.vars.outputs.tag }}" --github-output "$GITHUB_OUTPUT"

      - name: Check release metadata
        run: |
          node scripts/check-release-metadata.mjs \
            --release-version "${{ steps.release_meta.outputs.version }}" \
            --release-tag "${{ steps.release_meta.outputs.tag }}"

      - name: Check macOS signing secrets
        id: check_secrets
        run: |
          if [ -n "${{ secrets.CODESIGN_IDENTITY }}" ] && \
             [ -n "${{ secrets.APPLE_ID }}" ] && \
             [ -n "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" ] && \
             [ -n "${{ secrets.APPLE_TEAM_ID }}" ]; then
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release (DRAFT)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: "Hilal Browser ${{ steps.vars.outputs.tag }}"
          generate_release_notes: true
          draft: true
          prerelease: ${{ steps.release_meta.outputs.prerelease == 'true' }}

  sign-macos:
    needs: create-release
    runs-on: macos-latest
    timeout-minutes: 120

    if: ${{ needs.create-release.outputs.has_secrets == 'true' }}

    env:
      HAS_CODESIGN: ${{ secrets.CODESIGN_IDENTITY }}
      HAS_APPLE_ID: ${{ secrets.APPLE_ID }}
      HAS_APPLE_PASS: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      HAS_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      HAS_CERT: ${{ secrets.MACOS_CERTIFICATE }}
      HAS_SIGN_DB: ${{ secrets.HILAL_SIGNING_DB_BASE64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-release.outputs.tag }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            hil/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('hil/Cargo.toml') }}

      - name: Compile hil tool
        run: |
          cargo build --release --manifest-path hil/Cargo.toml
          mkdir -p bin
          cp hil/target/release/hil bin/hil
          strip bin/hil

      - name: Cache Firefox source checkout
        uses: actions/cache@v4
        with:
          path: |
            engine
            !engine/obj-*
          key: ${{ runner.os }}-firefox-${{ hashFiles('upstream.lock') }}
          restore-keys: |
            ${{ runner.os }}-firefox-

      - name: Setup Firefox source
        run: ./bin/hil setup

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.8

      - name: Apply patches
        run: ./bin/hil apply --force

      - name: Derive packaged release metadata
        id: release_meta
        run: |
          node scripts/release-env.mjs \
            --tag "${{ needs.create-release.outputs.tag }}" \
            --firefox-src engine \
            --require-firefox-version \
            --github-output "$GITHUB_OUTPUT"

      - name: Import signing certificate
        if: ${{ env.HAS_CERT != '' }}
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH="$(mktemp).p12"
          echo "$MACOS_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import "$CERT_PATH" -k build.keychain -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-keychain-settings -lut 3600 build.keychain
          security set-key-partition-list -S apple-tool:,apple: -k "" build.keychain
          rm -f "$CERT_PATH"

      - name: Build and package
        env:
          SCCACHE_GHA_ENABLED: "true"
        run: |
          export CODESIGN_IDENTITY="$HAS_CODESIGN"
          scripts/build-macos.sh package --no-symlinks

      - name: Sign and notarize
        env:
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: scripts/sign-macos.sh --notarize

      - name: Create DMG
        run: |
          APP_BUNDLE="$(find engine/obj-*/dist -name '*.app' -type d -print -quit)"
          echo "HILAL_APP_BUNDLE=$APP_BUNDLE" >> "$GITHUB_ENV"
          DMG_NAME="${{ steps.release_meta.outputs.macos_arm64_dmg }}"
          mkdir -p dist
          hdiutil create -volname "Hilal Browser" -srcfolder "$APP_BUNDLE" -ov -format UDZO "dist/$DMG_NAME"
          echo "dmg_path=dist/$DMG_NAME" >> "$GITHUB_ENV"

      - name: Smoke packaged browser
        run: scripts/smoke-browser.sh

      - name: Create MAR update
        env:
          HILAL_SIGNING_DB_BASE64: ${{ secrets.HILAL_SIGNING_DB_BASE64 }}
          HILAL_SIGNMAR_NSS_DIR: /tmp/signing-db
          HILAL_SIGNMAR_CERT: mar_sig
        run: |
          if [ -z "$HILAL_SIGNING_DB_BASE64" ]; then
            echo "HILAL_SIGNING_DB_BASE64 is required for production release MAR signing." >&2
            exit 1
          fi
          mkdir -p /tmp/signing-db
          echo "$HILAL_SIGNING_DB_BASE64" | base64 -d > signing-db.tar.gz
          tar -xzf signing-db.tar.gz -C /tmp/signing-db

          scripts/make-full-update.sh "${{ needs.create-release.outputs.tag }}" "dist/${{ steps.release_meta.outputs.macos_arm64_mar }}"

      - name: Generate update manifest
        run: |
          TAG="${{ needs.create-release.outputs.tag }}"

          node scripts/generate-update-manifest.mjs \
            --version "$TAG" \
            --display-version "${{ steps.release_meta.outputs.display_version }}" \
            --app-version "${{ steps.release_meta.outputs.firefox_app_version }}" \
            --channel "${{ steps.release_meta.outputs.channel }}" \
            --mar macos-arm64="dist/${{ steps.release_meta.outputs.macos_arm64_mar }}" \
            --mar-url macos-arm64="https://github.com/VastSea0/hilal-browser/releases/download/$TAG/${{ steps.release_meta.outputs.macos_arm64_mar }}" \
            --output dist/hilal-update-manifest.json

      - name: Check packaged release metadata
        run: |
          node scripts/check-release-metadata.mjs \
            --release-version "${{ steps.release_meta.outputs.version }}" \
            --release-tag "${{ steps.release_meta.outputs.tag }}" \
            --check-dist \
            --require-update-manifest \
            --require-platform macos-arm64

      - name: Generate Checksums
        run: |
          cd dist
          shasum -a 256 $(find . -maxdepth 1 -type f ! -name "SHA256SUMS") > SHA256SUMS
          echo "Checksums generated: dist/SHA256SUMS"

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: 'spdx-json'
          output-file: 'dist/hilal-browser-sbom.spdx.json'

      - name: Upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: |
            dist/*.dmg
            dist/*.mar
            dist/hilal-update-manifest.json
            dist/SHA256SUMS
            dist/hilal-browser-sbom.spdx.json

  build-linux:
    needs: create-release
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/lib/jvm
          sudo rm -rf /usr/local/share/boost
          sudo apt-get clean
          df -h

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-release.outputs.tag }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            nasm yasm libgtk-3-dev libpulse-dev libdbus-1-dev \
            libasound2-dev libx11-xcb-dev libxt-dev libdbus-glib-1-dev \
            pulseaudio libpulse-dev

      - name: Install AppImageTool
        run: |
          sudo wget -O /usr/local/bin/appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          sudo chmod +x /usr/local/bin/appimagetool

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            hil/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('hil/Cargo.toml') }}

      - name: Compile hil tool
        run: |
          cargo build --release --manifest-path hil/Cargo.toml
          mkdir -p bin
          cp hil/target/release/hil bin/hil
          strip bin/hil

      - name: Upload hil tool to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          fail_on_unmatched_files: false
          files: bin/hil

      - name: Cache Firefox source checkout
        uses: actions/cache@v4
        with:
          path: |
            engine
            !engine/obj-*
          key: ${{ runner.os }}-firefox-${{ hashFiles('upstream.lock') }}
          restore-keys: |
            ${{ runner.os }}-firefox-

      - name: Setup Firefox source
        run: ./bin/hil setup

      # Manual sccache setup: avoids the mozilla-actions/sccache-action post-job
      # hook which exits with code 2 and marks the whole job as failed.
      - name: Setup sccache
        run: |
          SCCACHE_VERSION="v0.10.0"
          curl -fsSL "https://github.com/nicovank/sccache/releases/download/${SCCACHE_VERSION}/sccache-linux-x86_64" -o /tmp/sccache || \
          curl -fsSL "https://github.com/mozilla/sccache/releases/download/${SCCACHE_VERSION}/sccache-${SCCACHE_VERSION}-x86_64-unknown-linux-musl.tar.gz" -o /tmp/sccache.tar.gz
          if [ -f /tmp/sccache.tar.gz ]; then
            tar -xzf /tmp/sccache.tar.gz -C /tmp
            find /tmp -name sccache -type f -exec cp {} /usr/local/bin/sccache \;
          elif [ -f /tmp/sccache ]; then
            sudo cp /tmp/sccache /usr/local/bin/sccache
          fi
          sudo chmod +x /usr/local/bin/sccache || true
          # If sccache binary is available via the action cache or system, just use it
          which sccache && sccache --start-server || echo "sccache not available, building without cache"

      - name: Apply patches
        run: ./bin/hil apply --force

      - name: Build and package (AppImage)
        env:
          SCCACHE_GHA_ENABLED: "true"
        run: scripts/build-linux.sh build appimage-build

      - name: Stop sccache
        if: always()
        continue-on-error: true
        run: sccache --stop-server || true

      - name: Upload Linux artifacts (safety net)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            dist/*.tar.gz
            dist/*.AppImage
          if-no-files-found: warn
          retention-days: 5

      - name: Check Linux package outputs
        continue-on-error: true
        run: |
          echo "=== Listing dist/ ==="
          ls -la dist/ 2>/dev/null || echo "dist/ does not exist"
          test -n "$(find dist -maxdepth 1 -name '*.tar.gz' -print -quit 2>/dev/null)" && echo "tar.gz found" || echo "WARNING: tar.gz not found"
          test -n "$(find dist -maxdepth 1 -name '*.AppImage' -print -quit 2>/dev/null)" && echo "AppImage found" || echo "WARNING: AppImage not found"

      - name: Upload Linux Assets to release
        if: always()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          fail_on_unmatched_files: false
          files: |
            dist/*.tar.gz
            dist/*.AppImage

  build-windows:
    needs: create-release
    runs-on: windows-latest
    timeout-minutes: 300

    steps:
      - name: Free disk space
        shell: pwsh
        run: |
          Write-Host "Disk space before cleanup:"
          Get-PSDrive -PSProvider FileSystem | Format-Table Name, @{n="Used(GB)";e={[math]::Round($_.Used/1GB,2)}}, @{n="Free(GB)";e={[math]::Round($_.Free/1GB,2)}}
          # Remove large preinstalled tools that are not needed
          Remove-Item -Recurse -Force "C:\Program Files\dotnet" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Program Files (x86)\Microsoft SDKs\Azure" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Program Files\MongoDB" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\imagegeneration" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\hostedtoolcache\CodeQL" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\hostedtoolcache\Java*" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\hostedtoolcache\go" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\hostedtoolcache\Python" -ErrorAction SilentlyContinue
          Write-Host "Disk space after cleanup:"
          Get-PSDrive -PSProvider FileSystem | Format-Table Name, @{n="Used(GB)";e={[math]::Round($_.Used/1GB,2)}}, @{n="Free(GB)";e={[math]::Round($_.Free/1GB,2)}}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-release.outputs.tag }}

      - name: Install MozillaBuild
        shell: pwsh
        run: |
          $url = "https://ftp.mozilla.org/pub/mozilla/libraries/win32/MozillaBuildSetup-Latest.exe"
          $out = "$env:TEMP\MozillaBuildSetup.exe"
          Write-Host "Downloading MozillaBuild..."
          Invoke-WebRequest -Uri $url -OutFile $out -UseBasicParsing
          Write-Host "Installing MozillaBuild silently..."
          Start-Process -FilePath $out -ArgumentList "/S" -Wait
          Remove-Item $out -ErrorAction SilentlyContinue
          if (Test-Path "C:\mozilla-build") {
            Write-Host "MozillaBuild installed successfully."
          } else {
            throw "MozillaBuild installation failed."
          }

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\bin\
            ~\.cargo\registry\index\
            ~\.cargo\registry\cache\
            ~\.cargo\git\db\
            hil\target\
          key: ${{ runner.os }}-cargo-${{ hashFiles('hil/Cargo.toml') }}

      - name: Compile hil tool
        shell: pwsh
        run: |
          cargo build --release --manifest-path hil/Cargo.toml
          New-Item -ItemType Directory -Path bin -Force | Out-Null
          Copy-Item hil/target/release/hil.exe bin/hil.exe

      - name: Upload hil.exe to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          fail_on_unmatched_files: false
          files: bin/hil.exe

      - name: Cache Firefox source checkout
        uses: actions/cache@v4
        with:
          path: |
            engine
            !engine/obj-*
          key: ${{ runner.os }}-firefox-${{ hashFiles('upstream.lock') }}
          restore-keys: |
            ${{ runner.os }}-firefox-

      - name: Setup Firefox source
        shell: pwsh
        run: .\bin\hil.exe setup

      # Manual sccache setup to avoid the post-job hook failure
      - name: Setup sccache
        shell: pwsh
        run: |
          $sccache = Get-Command sccache -ErrorAction SilentlyContinue
          if ($sccache) {
            Write-Host "sccache found at: $($sccache.Source)"
            sccache --start-server 2>$null
          } else {
            Write-Host "sccache not found, building without compiler cache"
          }

      - name: Apply patches
        shell: pwsh
        run: .\bin\hil.exe apply --force

      - name: Build
        shell: pwsh
        env:
          SCCACHE_GHA_ENABLED: "true"
        run: |
          .\scripts\build-windows.ps1 -SkipApply

      - name: Upload build artifacts (safety net)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-artifacts
          path: |
            engine/obj-*/dist/*.exe
            engine/obj-*/dist/install/**/*.exe
            engine/obj-*/dist/*.zip
            engine/obj-*/dist/**/*.tar.*
          if-no-files-found: warn
          retention-days: 5

      - name: Package
        shell: pwsh
        run: |
          .\scripts\build-windows.ps1 -Package -SkipApply

      - name: Stop sccache
        if: always()
        continue-on-error: true
        shell: pwsh
        run: sccache --stop-server 2>$null; exit 0

      - name: List build outputs
        if: always()
        shell: pwsh
        run: |
          Write-Host "=== Searching for build outputs ==="
          $objDirs = Get-ChildItem -Path "engine" -Directory -Filter "obj-*" -ErrorAction SilentlyContinue
          foreach ($dir in $objDirs) {
            $distPath = Join-Path $dir.FullName "dist"
            if (Test-Path $distPath) {
              Write-Host "`n--- $distPath ---"
              Get-ChildItem -Path $distPath -Recurse -File -ErrorAction SilentlyContinue | Where-Object {
                $_.Extension -in ".exe", ".zip", ".tar", ".gz", ".xz", ".msi"
              } | ForEach-Object { Write-Host "  $($_.FullName) ($([math]::Round($_.Length/1MB, 2)) MB)" }
            }
          }

      - name: Upload Windows packaged artifacts (safety net)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-packaged-artifacts
          path: |
            engine/obj-*/dist/*.exe
            engine/obj-*/dist/install/**/*.exe
            engine/obj-*/dist/*.zip
          if-no-files-found: warn
          retention-days: 5

      - name: Upload Windows Assets to release
        if: always()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          fail_on_unmatched_files: false
          files: |
            engine/obj-*/dist/*.exe
            engine/obj-*/dist/install/**/*.exe
            engine/obj-*/dist/*.zip

  publish-release:
    needs: [create-release, sign-macos, build-linux, build-windows]
    if: ${{ always() && !cancelled() && needs.create-release.result == 'success' && (needs.sign-macos.result == 'success' || needs.build-linux.result == 'success' || needs.build-windows.result == 'success') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release tooling
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-release.outputs.tag }}

      - name: Check release assets before publishing
        if: ${{ needs.sign-macos.result == 'success' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.create-release.outputs.tag }}
        run: |
          gh release view "$TAG" --json tagName,isDraft,isPrerelease,assets > release.json
          node scripts/check-release-assets.mjs \
            --release-json release.json \
            --tag "$TAG" \
            --platform macos-arm64

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.create-release.outputs.tag }}
        run: |
          gh release edit "$TAG" --draft=false
