<!-- Hilal Browser panel -->

<html:template id="template-paneHilal">
<hbox id="hilalCategory"
      class="subcategory"
      hidden="true"
      data-category="paneHilal">
  <html:h1 data-l10n-id="hilal-settings-header"/>
</hbox>

<groupbox id="hilalWorkspacesGroup" data-category="paneHilal" hidden="true">
  <label><html:h2 data-l10n-id="hilal-workspaces-header"/></label>
  <vbox align="start">
    <checkbox id="hilalWorkspacesEnabled"
              label="Enable workspaces"/>
    <checkbox id="hilalWorkspacesPinnedPublic"
              label="Make pinned tabs visible in all workspaces"/>
    <checkbox id="hilalWorkspacesGroupsPublic"
              label="Make tab groups visible in all workspaces"/>
    <hbox>
      <description flex="1">Reset all workspace data (cannot be undone).</description>
      <button id="hilalWorkspacesReset"
              is="highlightable-button"
              class="accessory-button"
              label="Reset Workspaces"/>
    </hbox>
  </vbox>
</groupbox>
<groupbox id="hilalSidebarGroup" data-category="paneHilal" hidden="true">
  <label><html:h2>Sidebar Options</html:h2></label>
  <vbox align="start" style="margin-bottom: 16px;">
    <description style="margin-bottom: 8px; font-weight: bold;">Standard Footer Items:</description>
    <checkbox id="hilalSidebarFooterBookmarks"
              label="Bookmarks"/>
    <checkbox id="hilalSidebarFooterHistory"
              label="History"/>
    <checkbox id="hilalSidebarFooterPasswords"
              label="Passwords"/>
    <checkbox id="hilalSidebarFooterDownloads"
              label="Downloads"/>
    <checkbox id="hilalSidebarFooterPrivacy"
              label="Privacy"/>
    <checkbox id="hilalSidebarFooterSettings"
              label="Settings"/>
  </vbox>

  <vbox align="start" style="border-top: 1px solid var(--in-content-border-color); padding-top: 16px; margin-top: 8px;" flex="1">
    <description style="margin-bottom: 8px; font-weight: bold;">Custom Sidebar Shortcuts:</description>
    <description style="margin-bottom: 8px; font-size: 0.9em; opacity: 0.85;">Add your own custom pages, bookmarks, or external links to the sidebar footer.</description>
    
    <richlistbox id="hilalSidebarCustomList" style="height: 120px; width: 100%; min-width: 400px; margin-bottom: 10px;">
    </richlistbox>
    
    <hbox spacing="10" style="margin-bottom: 12px;">
      <button id="hilalSidebarCustomAdd"
              is="highlightable-button"
              class="accessory-button"
              label="Add Shortcut"/>
      <button id="hilalSidebarCustomRemove"
              is="highlightable-button"
              class="accessory-button"
              label="Remove Selected"
              disabled="true"/>
    </hbox>

    <vbox id="hilalSidebarCustomForm" hidden="true" style="width: 100%; min-width: 400px; padding: 12px; border: 1px solid var(--in-content-border-color); border-radius: 6px; background-color: var(--in-content-box-background); margin-top: 4px;">
      <grid>
        <columns>
          <column style="padding-right: 8px; font-weight: 500; min-width: 80px;"/>
          <column flex="1"/>
        </columns>
        <rows>
          <row align="center" style="margin-bottom: 8px;">
            <label value="Name:"/>
            <html:input id="hilalSidebarCustomName" type="text" placeholder="e.g. My Workspace or Hacker News"/>
          </row>
          <row align="center" style="margin-bottom: 8px;">
            <label value="URL:"/>
            <html:input id="hilalSidebarCustomUrl" type="text" placeholder="e.g. https://news.ycombinator.com or about:logins"/>
          </row>
          <row align="center" style="margin-bottom: 8px;">
            <label value="Icon:"/>
            <html:select id="hilalSidebarCustomIcon" style="padding: 4px; border-radius: 4px; border: 1px solid var(--in-content-border-color); background: var(--in-content-button-background); color: inherit;">
              <html:option value="link">Globe/Link (Default)</html:option>
              <html:option value="bookmark">Bookmark</html:option>
              <html:option value="history">History</html:option>
              <html:option value="key">Key (Password)</html:option>
              <html:option value="downloads">Download</html:option>
              <html:option value="shield">Shield (Privacy)</html:option>
              <html:option value="settings">Settings</html:option>
            </html:select>
          </row>
        </rows>
      </grid>
      <hbox spacing="10" style="margin-top: 12px;">
        <button id="hilalSidebarCustomSave"
                is="highlightable-button"
                class="accessory-button"
                label="Save"/>
        <button id="hilalSidebarCustomCancel"
                is="highlightable-button"
                class="accessory-button"
                label="Cancel"/>
      </hbox>
    </vbox>
  </vbox>
</groupbox>

<groupbox id="hilalPrivacyGroup" data-category="paneHilal" hidden="true">
  <label><html:h2>Privacy Level</html:h2></label>
  <vbox align="start">
    <description style="margin-bottom: 8px; max-width: 720px;">
      Hilal privacy levels are explicit hardening profiles. They do not hide your public IP address, do not replace Tor Browser, and may break sites that depend on fingerprinting surfaces, WebGL, WebRTC, persistent cookies, saved passwords, or JavaScript.
    </description>
    <radiogroup id="hilalPrivacyLevel" orient="vertical">
      <radio id="hilalPrivacyStandard"
             value="standard"
             label="Balanced (LibreWolf-like): strict tracking protection, RFP, HTTPS-only, URL cleanup, WebGL off, reduced WebRTC exposure, cookies/cache cleared on close."/>
      <radio id="hilalPrivacyStrict"
             value="strict"
             label="Strict: Balanced plus First Party Isolation and WebRTC disabled. Safer for privacy, more likely to break video calls and sign-in flows."/>
      <radio id="hilalPrivacyExtreme"
             value="extreme"
             label="Maximum local hardening (not Tor): Strict plus JavaScript off, camera/microphone/location blocked, and browsing history cleared on close."/>
    </radiogroup>
  </vbox>
</groupbox>

<groupbox id="hilalUiFixGroup" data-category="paneHilal" hidden="true">
  <label><html:h2 data-l10n-id="hilal-uifix-header"/></label>
  <vbox align="start">
    <checkbox id="hilalUiFixEnabled"
              label="Enable UI Enhancements (includes Firefox-UI-Fix by @black7375)"/>
    <vbox id="hilalUiFixSubOptions" class="indent">
      <checkbox id="hilalUiFixConnectToWindow"
                label="Connected Tabs (Connect tab borders to the window)"/>
      <checkbox id="hilalUiFixCompactPadding"
                label="Compact Tab Padding (Slimmer, Lepton-style tabs)"/>
      <checkbox id="hilalUiFixDynamicSeparator"
                label="Dynamic Tab Separators"/>
      <checkbox id="hilalUiFixBottomRounded"
                label="Rounded Bottom Tab Corners"/>
      <checkbox id="hilalUiFixCloseOnHover"
                label="Show Tab Close Button Only on Hover"/>
    </vbox>
  </vbox>
</groupbox>

<groupbox id="hilalBangsGroup" data-category="paneHilal" hidden="true">
  <label><html:h2 data-l10n-id="hilal-bangs-header"/></label>
  <vbox align="start" class="indent" flex="1">
    <richlistbox id="hilalBangsList" style="height: 150px; min-width: 400px; margin-bottom: 10px;">
    </richlistbox>
    
    <hbox spacing="10">
      <button id="hilalBangsAdd"
              is="highlightable-button"
              class="accessory-button"
              data-l10n-id="hilal-bangs-add-button"/>
      <button id="hilalBangsRemove"
              is="highlightable-button"
              class="accessory-button"
              data-l10n-id="hilal-bangs-remove-button"
              disabled="true"/>
    </hbox>

    <vbox id="hilalBangsForm" hidden="true" style="margin-top: 10px; padding: 10px; border: 1px solid var(--in-content-border-color); border-radius: 4px; background-color: var(--in-content-box-background);">
      <grid>
        <columns>
          <column/>
          <column flex="1"/>
        </columns>
        <rows>
          <row align="center">
            <label data-l10n-id="hilal-bangs-trigger-label"/>
            <html:input id="hilalBangsTrigger" type="text" placeholder="e.g., g"/>
          </row>
          <row align="center">
            <label data-l10n-id="hilal-bangs-searchurl-label"/>
            <html:input id="hilalBangsSearchUrl" type="text" placeholder="https://www.google.com/search?q={query}"/>
          </row>
          <row align="center">
            <label data-l10n-id="hilal-bangs-homeurl-label"/>
            <html:input id="hilalBangsHomeUrl" type="text" placeholder="https://www.google.com"/>
          </row>
        </rows>
      </grid>
      <hbox spacing="10" style="margin-top: 10px;">
        <button id="hilalBangsSave"
                is="highlightable-button"
                class="accessory-button"
                data-l10n-id="hilal-bangs-save-button"/>
        <button id="hilalBangsCancel"
                is="highlightable-button"
                class="accessory-button"
                data-l10n-id="hilal-bangs-cancel-button"/>
      </hbox>
    </vbox>
  </vbox>
</groupbox>
</html:template>
